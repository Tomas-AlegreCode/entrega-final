<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
   
    <!-- enlace hoja de estilo -->
    <link rel="stylesheet" href="./css/style.css">

    <title>primer entrega</title>
</head>
<body>
    <header>
        <!-- titulo -->
         
        <h1>The Arcade</h1>

       <!-- boton contacto mobile -->

        <nav class="button-header">
            <button type="button" class="btn btn-outline-secondary">
                <a href="">Contacto</a>
            </button> 
        </nav>

        <!-- Barra de menú flotante mobile -->
    <div class="menu-flotante">
        <button class="boton-idioma">🌐 Idioma</button>
        <div class="menu-item">
            <button class="boton-menu">Menú ▼</button>
            <div class="desplegable">
                <a href="#">Inicio</a>
                <a href="#">Servicios</a>
                <a href="#">Contacto</a>
            </div>
        </div>
        <button class="boton-buscar">🔍 Buscar</button>
    </div>


     <!-- contenido principal -->

    <main>

    

    <!-- banner desktop -->
     
    <div class="no-mobile" >
        <img src="./img/banner principal.jpg" alt="Banner principal con imagenes de accesorios para gaming">
    </div>

    <!-- banner mobile -->

    <!-- <div class="banner-mobile">
        <img src="./img/logo.png" alt="imagen principal del sitio en mobile">
    </div> -->

    <!-- grid de mas vendidos y ofertas -->

    <div class="container-fluid">
        <div class="row ">
            <div class="col p-5">
                <h2 class="titulo-grid-uno">Lo mas Vendido</h2>
                <img class="img-games" src="./img/productos-juegos.jpg" alt="imagen difuminada con la leyenda de juegos">
            </div>
        </div>

        <div class="row p-4">
            <div class="col">
                <h2 class="titulo-grid-dos">Ofertas</h2>
                <img class="img-consols" src="./img/productos-consolas.jpg" alt="imagen difuminada con la leyenda de consolas">  
            </div>
        </div>

    </div> 

    </main>
    <!-- footer -->
     <footer>
        <p>Todos los derechos reservados</p>

        <div class="img-footer">
            <img src="./img/logo-footer100x100px.png" alt="logo con el nombre de la empresa">
        </div>
    </footer>

    <!-- bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

</body>
</html>
